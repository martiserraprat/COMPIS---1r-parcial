<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Compiladors</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #222; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header .meta { font-size: 0.85rem; color: #aaa; }
  .controls { background: #fff; border-bottom: 1px solid #e0e0d8; padding: 1rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
  .controls select, .controls button { padding: 0.45rem 0.9rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; background: #fff; cursor: pointer; }
  .controls button { background: #1a1a2e; color: #fff; border-color: #1a1a2e; font-weight: 500; }
  .controls button:hover { background: #2a2a4e; }
  .controls button.secondary { background: #fff; color: #333; border-color: #ccc; }
  .controls button.secondary:hover { background: #f0f0ea; }
  .score-bar { background: #fff; padding: 0.7rem 2rem; border-bottom: 1px solid #e0e0d8; font-size: 0.9rem; color: #555; display: flex; gap: 2rem; flex-wrap: wrap; }
  .score-bar span { font-weight: 600; }
  .score-bar .correct { color: #2d7a2d; }
  .score-bar .wrong { color: #b33; }
  .score-bar .skip { color: #888; }
  .questions { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; }
  .q-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0d8; padding: 1.5rem; }
  .q-header { display: flex; gap: 0.7rem; align-items: flex-start; margin-bottom: 1.2rem; }
  .q-num { background: #1a1a2e; color: #fff; border-radius: 50%; min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
  .q-badge { font-size: 0.72rem; background: #f0f0ea; color: #666; border-radius: 20px; padding: 2px 8px; margin-right: 4px; white-space: nowrap; }
  .q-topic { font-size: 0.72rem; background: #e8f0fe; color: #1a56db; border-radius: 20px; padding: 2px 8px; white-space: nowrap; }
  .q-text { font-size: 0.95rem; line-height: 1.55; color: #222; flex: 1; }
  .q-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem; padding-left: 2.2rem; }
  .options { display: flex; flex-direction: column; gap: 0.5rem; }
  .opt { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.65rem 0.9rem; border-radius: 7px; border: 1.5px solid #e0e0d8; cursor: pointer; font-size: 0.9rem; line-height: 1.5; transition: border-color 0.15s, background 0.15s; }
  .opt:hover { border-color: #aaa; background: #fafaf8; }
  .opt.selected { border-color: #1a1a2e; background: #f0f0f8; }
  .opt.correct { border-color: #2d7a2d; background: #f0fff0; }
  .opt.wrong { border-color: #b33; background: #fff0f0; }
  .opt.correct-answer { border-color: #f0a000; background: #fffbea; }
  .opt-letter { font-weight: 600; color: #888; min-width: 18px; }
  .opt.correct .opt-letter { color: #2d7a2d; }
  .opt.wrong .opt-letter { color: #b33; }
  .opt.correct-answer .opt-letter { color: #b07800; }
  .q-status { margin-top: 1rem; padding: 0.6rem 0.9rem; border-radius: 6px; font-size: 0.85rem; display: none; }
  .q-status.show { display: block; }
  .q-status.ok { background: #f0fff0; color: #2d7a2d; border: 1px solid #b3e6b3; }
  .q-status.fail { background: #fff0f0; color: #b33; border: 1px solid #f5b3b3; }
  .q-status.info { background: #fffbea; color: #7a5000; border: 1px solid #f5dcaa; }
  .q-card.answered .opt { cursor: default; pointer-events: none; }
  .q-card.answered .opt:hover { background: inherit; border-color: inherit; }
  .q-card.answered .opt.correct { background: #f0fff0; border-color: #2d7a2d; }
  .q-card.answered .opt.wrong { background: #fff0f0; border-color: #b33; }
  .q-card.answered .opt.correct-answer { background: #fffbea; border-color: #f0a000; }
  .q-card.answered .opt.selected.correct-answer { background: #fffbea; border-color: #f0a000; }
  .progress-wrap { height: 6px; background: #e0e0d8; border-radius: 3px; margin: 0 2rem 0; }
  .progress-fill { height: 100%; background: #1a1a2e; border-radius: 3px; transition: width 0.3s; }
  .empty { text-align: center; color: #888; padding: 4rem 2rem; font-size: 1rem; }
  .topic-section h2 { font-size: 1rem; color: #555; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; padding: 0 0.5rem; border-left: 3px solid #1a1a2e; padding-left: 0.75rem; }
  .section-wrap { display: flex; flex-direction: column; gap: 1.5rem; }
  @media (max-width: 600px) { .controls { flex-direction: column; } .score-bar { gap: 1rem; } }
</style>
</head>

<script>
const ALL_QUESTIONS = [
  // ===== 2020-2021 =====
  {year:"2020",topic:"lexic",q:"¿Porque se utiliza una AFD para implementar un scanner en vez de un AFND que es más fácil de crear?",opts:["Porque dado un carácter leído y un estado sabemos a que estado irá el AFD.","Porque los AFD permiten diferenciar símbolos que empiezan por la misma secuencia de caracteres y los AFND no pueden.","Porque en la ejecución de un AFD sólo necesitamos una variable para guardar el estado en que está.","a) y c).","Ninguna de las anteriores."],ans:3},
  {year:"2020",topic:"lexic",q:"¿Que efecto tiene una transición por secuencia vacía de un estado A a un estado B?",opts:["Que los estados A y B son equivalentes ya que siempre estaremos en los dos estados a la vez.","Que al estar en el estado A también estamos en el estado B.","Que al estar en el estado B también estamos en el estado A.","Que cuando llegamos en el estado A hacemos la transición al estado B abandonando el estado A.","Ninguna de las anteriores."],ans:1},
  {year:"2020",topic:"lexic",q:"El autómata que se utiliza para implementar un scanner...",opts:["Ha leído un símbolo cuando llega al final de la secuencia de caracteres y está en un estado final.","Ha leído un símbolo cuando ya no puede hacer más transiciones.","Ha leído un símbolo cuando ya no puede hacer más transiciones y está en un estado final.","Ha leído un símbolo cuando ya no puede hacer más transiciones y ha pasado por un estado final.","Ninguna de las anteriores."],ans:3},
  {year:"2020",topic:"sintax",q:"El análisis sintáctico:",opts:["Lee los caracteres de entrada y los convierte en símbolos.","Se encarga de comprobar que el programa cumpla aquellas restricciones dependientes del contexto del lenguaje de programación.","Agrupa los símbolos de la secuencia de entrada en estructuras sintácticas que forman el árbol sintáctico.","Todas las anteriores.","Ninguna de las anteriores."],ans:2},
  {year:"2020",topic:"sintax",q:"¿Cuántos símbolos no terminales aparecen en el árbol sintáctico generado para la expresión: if (a+30) then b*5 else d\n\nCuando se analiza con la siguiente gramática:\nRule <Inicial>::= <Exp> | If <Exp> then <Exp> else <Exp>\nRule <Exp>::= <Terme> {(\"+\"|\"-\") <Terme>}\nRule <Terme>::= <Factor> {(\"*\"|\"/\") <Factor>}\nRule <Factor>::= numero | identificador [\"=\" <Exp>] | \"(\" <Exp> \")\"",opts:["18","16","17","15","Ninguna de las anteriores."],ans:1},
  {year:"2020",topic:"sintax",q:"Sobre la gramática siguiente:\nR1 <Inicial>::= <Exp> | var identificador [\"[\"<Exp>\"]\"]\nR2 <Exp>::= <factor> {(\"+\"|\"-\") <factor>}\nR3 <Factor>::= numero | identificador [\"=\" <Exp>] | \"(\" <Exp> \")\"\n\n¿Cuántas producciones resultan de la conversión de las reglas BNF descritas anteriormente?",opts:["16","14","12","15","Ninguna de las anteriores."],ans:0},
  {year:"2020",topic:"sintax",q:"Sobre la gramática anterior (R1, R2, R3):\n\n¿Cuáles son los primeros de los símbolos no terminales?",opts:["<Inicial> = {numero, identificador, \"(\", \"=\"}\n<Exp> = {numero, identificador, \"(\", \"=\"}\n<Factor> = {numero, identificador, \"(\", \"=\"}","<Inicial> = {numero, identificador, \"(\", \"=\", var, \"[\"}\n<Exp> = {numero, identificador, \"(\", \"=\"}\n<Factor> = {numero, identificador, \"(\", \"=\"}","<Inicial> = {numero, identificador, \"(\", var}\n<Exp> = {numero, identificador, \"(\"}\n<Factor> = {numero, identificador, \"(\"}","<Inicial> = {numero, identificador, \"(\", var}\n<Exp> = {numero, identificador, \"(\", \"=\", \"+\", \"-\"}\n<Factor> = {numero, identificador, \"(\", \"=\"}","Ninguna de las anteriores."],ans:2},
  {year:"2020",topic:"sintax",q:"¿Cuándo decimos que una gramática es ambigua?",opts:["Cuando genera un árbol sintáctico para cada secuencia de símbolos.","Cuando genera más de una secuencia de derivación para una misma secuencia de símbolos.","Cuando a partir de la misma secuencia de derivación genera más de una secuencia de símbolos.","Cuando genera más de un árbol sintáctico para alguna secuencia de símbolos.","Ninguna de las anteriores."],ans:3},
  {year:"2020",topic:"semantic",q:"¿Qué son los símbolos de acción en una gramática?",opts:["Es código que se ejecutará cuando el analizador sintáctico pasa por el punto de la regla BNF donde está el símbolo de acción.","Es una forma de agrupar símbolos no terminales. Un símbolo de acción genera secuencias de símbolos no terminales.","Son una representación del significado del símbolo no terminal que hay a la izquierda de ::= en las reglas BNF.","Un símbolo de acción representa una eliminación o inserción de símbolos terminales en la secuencia de símbolos leídos por el scanner.","Ninguna de las anteriores."],ans:0},
  {year:"2020",topic:"semantic",q:"La tabla de símbolos de un lenguaje orientado a objeto...",opts:["Tiene un grafo cíclico cuyos vértices representan las clases y las aristas las relaciones de herencia.","Tiene un grafo acíclico cuyos vértices representan las clases y las aristas las relaciones de herencia.","Tiene una pila para representar los ámbitos locales y un grafo cíclico cuyos vértices representan las clases y las aristas las relaciones de herencia.","Tiene una pila para representar los ámbitos locales y un grafo acíclico cuyos vértices representan las clases y las aristas las relaciones de herencia.","Ninguna de las anteriores."],ans:3},
  {year:"2020",topic:"semantic",q:"Los tipos de datos se representan como...",opts:["Una estructura de datos recursiva acíclica.","Una estructura de datos recursiva que puede ser cíclica.","Una estructura de datos de tamaño fijo.","Una estructura de datos no recursiva.","Ninguna de las anteriores."],ans:1},
  {year:"2020",topic:"semantic",q:"¿Cuáles son los tipos de búsquedas en la tabla de símbolos más importantes?",opts:["La búsqueda de un símbolo dentro del ámbito local y la búsqueda de un símbolo por todos los ámbitos accesibles de la tabla de símbolos.","La búsqueda de una clase en el ámbito global y la búsqueda de variables en todos los ámbitos anidados que hay en la tabla de símbolos.","La búsqueda de una clase en ámbitos locales y en el ámbito global, y la búsqueda de variables en todos los ámbitos anidados que hay en la tabla de símbolos.","La búsqueda de variables en todos los ámbitos anidados que hay en la tabla de símbolos y la búsqueda de miembros en las clases.","Ninguna de las anteriores."],ans:0},
  {year:"2020",topic:"semantic",q:"¿Cuándo hay que insertar en la tabla de símbolos la entrada del tipo de datos que se declara?\n\nRule <DecTipus>::= Type identificador = <tipus> ;\nRule <tipus>::= Integer | Real | Character | Bool | ^ <tipus> | Array \"[\" numero \"]\" of <tipus> | identificador",opts:["Al final de la regla <DecTipus> después de <tipus>.","Antes de <tipus> en la regla <DecTipus>.","Antes de identificador en la regla <DecTipus>.","Dentro de la regla de <tipus> justo después de ::=.","Ninguna de las anteriores."],ans:1},
  {year:"2020",topic:"semantic",q:"¿Qué acciones semánticas se han de hacer en la regla <terme> cuando el análisis sintáctico pasa por dentro de la repetición?\n\nRule <terme>::=<factor> {* <factor> | / <factor>}",opts:["Verificar que queremos que <terme> de un resultado.","Que los tipos de datos de los factores sean entero o real.","Que el tipo de datos del resultado de <terme> será un right-value entero o real según las reglas de los operadores * y /","Todas las anteriores.","Ninguna de las anteriores."],ans:3},
  {year:"2020",topic:"semantic",q:"¿En la regla <factor> que significados correctos puede tener identificador?\n\nRule <Factor>::= Numero | Caracter | String | True | False | Null | ! <Factor> | - <Factor>| & <Factor> | \"(\" <Expressio> \")\" | \"new\" <Tipus> [<parametres>] | (This | Identificador [<Parametres>]) <Acces> [= <Expressio>]",opts:["Puede ser una variable, una función y un procedimiento.","Puede ser una variable, una función, un procedimiento, un atributo de una clase y un método de una clase.","Puede ser una variable, una función, un procedimiento, un atributo de una clase, un método de una clase y una clase.","Puede ser una variable, una función, un procedimiento y una clase.","Ninguna de las anteriores."],ans:2},

  // ===== 2021-2022 =====
  {year:"2021",topic:"lexic",q:"¿Qué se ha especificar para poder definir el análisis lexicográfico de un lenguaje de programación?",opts:["Las expresiones regulares de los símbolos del lenguaje y la expresión regular de los separadores.","Las expresiones regulares de los símbolos del lenguaje, los algoritmos de cálculo de los atributos de los símbolos y la expresión regular de los separadores.","Las expresiones regulares de los símbolos del lenguaje, la expresión regular de los separadores y los algoritmos de cálculo de los atributos de los símbolos y separadores.","Las expresiones regulares de los símbolos del lenguaje.","Ninguna de las anteriores."],ans:1},
  {year:"2021",topic:"lexic",q:"¿Cuándo podemos decir que el autómata de un scanner ha leído un símbolo?",opts:["Cuando al finalizar su ejecución esta en un estado final.","Cuando ya no puede realizar más transiciones y esta en un estado final.","Cuando ha pasado por un estado final.","Cuando ya no puede realizar más transiciones y ha pasado por un estado final.","Ninguna de las anteriores."],ans:3},
  {year:"2021",topic:"lexic",q:"¿Cómo clasifica un scanner los caracteres que ha leído?",opts:["Todos los caracteres que ha leído un scanner forman parte del símbolo que ha leído.","Los primeros caracteres leídos forman parte de los separadores y los últimos caracteres leídos forman parte del símbolo.","Los primeros caracteres leídos forman parte de los separadores y los caracteres intermedios leídos forman parte del símbolo y los últimos caracteres leídos se han de devolver a la entrada para la siguiente llamada al scanner.","Los primeros caracteres leídos forman parte del símbolo y los últimos caracteres leídos se han de devolver a la entrada para la siguiente llamada al scanner.","Ninguna de las anteriores."],ans:2},
  {year:"2021",topic:"lexic",q:"¿Qué tipos de transiciones puede tener un autómata finito no determinista?",opts:["Dado un estado y un carácter de entrada va a otro estado.","Dado un estado y un carácter de entrada va a un subconjunto del conjunto de estados del autómata.","Dado un estado y secuencia vacía va a un subconjunto del conjunto de estados del autómata.","Todas las anteriores.","Ninguna de las anteriores."],ans:3},
  {year:"2021",topic:"sintax",q:"¿Como podemos representar la gramática de un lenguaje de programación?",opts:["Producciones, reglas BNF y diagramas sintácticos.","Autómatas finitos deterministas.","Autómatas finitos no deterministas.","Todas las anteriores.","Ninguna de las anteriores."],ans:0},
  {year:"2021",topic:"sintax",q:"Un árbol sintáctico de una secuencia de símbolos está compuesto por...",opts:["Por la secuencia de producciones aplicadas en los pasos de derivación de una secuencia de símbolos, donde cada nodo del árbol es el símbolo de la izquierda de una producción y los hijos los símbolos de la derecha de la producción.","Las hojas del árbol sintáctico son símbolos terminales y los nodos intermedios son símbolos no terminales.","a) y b).","Las hojas y nodos intermedios del árbol sintáctico son símbolos terminales.","Ninguna de las anteriores."],ans:2},
  {year:"2021",topic:"sintax",q:"En los conjuntos de siguientes de los símbolos no terminales de una gramática podemos encontrar:",opts:["Símbolos no terminales, símbolos terminales, la secuencia vacía y el final de secuencia.","Símbolos no terminales, símbolos terminales y el final de secuencia.","Símbolos terminales y el final de secuencia.","Símbolos terminales y la secuencia vacía.","Ninguna de las anteriores."],ans:2},
  {year:"2021",topic:"sintax",q:"¿Que han de cumplir una gramática para que sea LL(1)?",opts:["Que los conjuntos de primeros de las producciones del mismo símbolo no terminal sean disjuntos.","Que los conjuntos de primeros de las producciones de la gramática sean disjuntos.","Que los conjuntos de primeros de los símbolos no terminales sean disjuntos.","Que los conjuntos de siguientes de los símbolos no terminales sean disjuntos.","Ninguna de las anteriores."],ans:0},
  {year:"2021",topic:"sintax",q:"¿Qué secuencia de símbolos representa la expresión BNF: [x|{y}] x",opts:["x y x y x","x x x","y y y x","x y y y x","Ninguna de las anteriores."],ans:2},
  {year:"2021",topic:"semantic",q:"El análisis semántico...",opts:["Calcula atributos de símbolos terminales.","Calcula atributos de símbolos no terminales.","Verifica que los atributos cumplan con las restricciones del lenguaje.","Todas las anteriores.","Ninguna de las anteriores."],ans:3},
  {year:"2021",topic:"semantic",q:"En un lenguaje orientado a objeto la tabla de símbolos tiene estructura...",opts:["De pila para los ámbitos anidados y de grafo para las clases.","De grafo para los ámbitos anidados y de pila para las clases.","De pila para los ámbitos anidados.","De pila para los ámbitos anidados y de grafo acíclico para las clases.","Ninguna de las anteriores."],ans:3},
  {year:"2021",topic:"semantic",q:"El atributo tipos de datos...",opts:["Está representado por una estructura dinámica que puede ser cíclica.","Está representado por una estructura dinámica lineal.","Está representado por una estructura dinámica que puede ser cíclica y compartida parcial o totalmente por varios símbolos.","Está representado por una estructura dinámica lineal y no compartida por el significado de los símbolos que hay en la tabla de símbolos.","Ninguna de las anteriores."],ans:2},
  {year:"2021",topic:"semantic",q:"En un programa correcto, la búsqueda del identificador de la regla <PossibleLValue> en la tabla de símbolos puede dar...\n\nEjemplos: a=10; c=f(3,4); obj=Point(10,20);",opts:["Una o más entradas de la tabla de símbolos.","ETSVar para variables o campos de clase/objeto.","ETSFuncion para llamadas a funciones, procedimientos o métodos, ETSTipus para llamadas a constructores.","Todas las anteriores.","Ninguna de las anteriores."],ans:3},
  {year:"2021",topic:"semantic",q:"El análisis semántico de la instrucción while <expressio> do <instruccio> verifica...",opts:["Que el resultado de <expressio> sea de tipo booleano.","Que el resultado de <expressio> sea de tipo booleano y que <instrucción> no de ningún resultado.","Que el resultado de <expressio> sea de tipo booleano o integer.","Que el resultado de <expressio> sea true para ejecutar <instruccio> y false para salir del bucle.","Ninguna de las anteriores."],ans:0},
  {year:"2021",topic:"semantic",q:"En la declaración de un tipo de datos, ¿Cuándo hay que poner ETSTipus en la tabla de símbolos?\n\n<DecTipus>::= identificador (1) = <tipus> (2)",opts:["Se ha de poner en la tabla de símbolos en (2) para que no se puede utilizar durante la compilación de <tipus>.","Se ha de poner en la tabla de símbolos en (1) para que se puede utilizar durante la compilación de <tipus>.","Es indiferente poner ETSTipus en (1) o (2) ya que no hay forma de utilizar un tipo de datos dentro de <tipus>.","Se ha de poner en la tabla de símbolos en (1) para que se puede utilizar durante la compilación de <tipus> dentro del tipo de datos base de un apuntador (tipo de datos apuntado).","Ninguna de las anteriores."],ans:3},

  // ===== 2022-2023 =====
  {year:"2022",topic:"lexic",q:"Per definir l’anàlisi lexicogràfica d’un llenguatge de programació s’ha de definir...",opts:["Una expressió regular per a cada símbol terminal del llenguatge, un algorisme que calculi els valors dels atributs dels símbols terminals i una expressió regular pels separadors.","Una expressió regular per a cada símbol terminal del llenguatge, una expressió regular pels separadors i un algoritme que calculi els valors dels atributs dels símbols terminals i separadors.","Una expressió regular per a cada símbol terminal i no terminal del llenguatge, un algoritme que calculi els valors dels atributs dels símbols terminals i una expressió regular pels separadors.","Una expressió regular per a cada símbol del llenguatge.","Cap de les anteriors."],ans:0},
  {year:"2022",topic:"lexic",q:"Diferències entre autòmat finit determinista i no determinista?",opts:["Donat un estat i un caràcter de l’entrada, l’autòmat finit no determinista pot fer transicions a diversos estats.","L’autòmat finit no determinista pot tenir transicions per seqüència buida.","L’autòmat finit no determinista pot estar en més d’un estat a la vegada durant la seva execució.","Totes les anteriors.","Cap de les anteriors."],ans:3},
  {year:"2022",topic:"lexic",q:"Quan l’autòmat d’un escàner troba un error lexicogràfic?",opts:["Quan en acabar la lectura de la seqüència d’entrada no es troba en un estat final.","Quan no existeix una transició pel caràcter llegit que surti de l’estat on es troba l’autòmat.","Quan no existeix una transició pel caràcter llegit que surti de l’estat on es troba l’autòmat i aquet estat no és final.","Quan no existeix una transició pel caràcter llegit que surti de l’estat on es troba l’autòmat i no ha passat per cap estat final.","Cap de les anteriors."],ans:3},
  {year:"2022",topic:"lexic",q:"Quins passos s’han de seguir per crear l’autòmat d’un escàner?",opts:["Crear l’expressió regular de l’escàner. Transformar aquesta expressió regular a autòmat finit determinista.","Crear l’expressió regular de l’escàner. Transformar aquesta expressió regular a autòmat finit no determinista.","Crear l’expressió regular de l’escàner. Transformar aquesta expressió regular a autòmat finit no determinista. Transformar l’autòmat finit no determinista a determinista.","Crear l’expressió regular de l’escàner. Transformar aquesta expressió regular a autòmat finit determinista. Transformar l’autòmat finit determinista a no determinista.","Cap de les anteriors."],ans:2},
  {year:"2022",topic:"lexic",q:"Quan s’executa una vegada, l’escàner llegeix...",opts:["Els caràcters dels separadors que poden haver davant del símbol i els caràcters del símbol.","Els caràcters dels separadors que poden haver davant del símbol, els caràcters del símbol i alguns caràcters més si és necessari.","Els caràcters del separador, si n’hi ha algun, i si no n’hi ha, els caràcters del símbol.","Els caràcters del símbol.","Cap de les anteriors."],ans:1},
  {year:"2022",topic:"sintax",q:"Quines condicions ha de complir una gramàtica per ser LL(1)?",opts:["Els conjunts de símbols primers dels símbols no terminals han de ser disjunts.","Els conjunts de símbols primers de totes les produccions han de ser disjunts.","Els conjunts de símbols primers de les produccions del mateix símbol no terminal han de ser disjunts.","Els conjunts de símbols següents de les produccions del mateix símbol no terminal han de ser disjunts.","Cap de les anteriors."],ans:2},
  {year:"2022",topic:"sintax",q:"Quin avantatge dona a un analitzador sintàctic que una gramàtica sigui LL(1)?",opts:["La complexitat de l’anàlisi sintàctica serà el nombre de símbols de la seqüència a analitzar per el nombre de símbols no terminals de la gramàtica.","La complexitat de l’anàlisi sintàctica serà el nombre de símbols de la seqüència a analitzar.","La complexitat de l’anàlisi sintàctica serà el nombre de símbols de la seqüència a analitzar pel nombre màxim de produccions que siguin del mateix símbol no terminal.","La complexitat de l’anàlisi sintàctica serà el logaritme del nombre de símbols de la seqüència a analitzar.","Cap de les anteriors."],ans:1},
  {year:"2022",topic:"sintax",q:"Com interessa que siguin les gramàtiques que s’utilitzen per implementar l’anàlisi sintàctica a un compilador?",opts:["No ambigües i que agrupin els símbols en les estructures sintàctiques del llenguatge.","Ambigües i que agrupin els símbols en les estructures sintàctiques del llenguatge.","Regulars i que agrupin els símbols en les estructures semàntiques del llenguatge.","Dependents del context i que agrupin els símbols en les estructures semàntiques del llenguatge.","Cap de les anteriors."],ans:0},
  {year:"2022",topic:"sintax",q:"Quin avantatge dona l’arbre sintàctic respecte la seqüència de derivació?",opts:["Un arbre sintàctic d’una seqüència de símbols pot arribar a representar totes les seqüencies de derivació valides, i per tant, és una representació abstracta de la anàlisi sintàctica de la seqüència de símbols.","Un arbre sintàctic d’una seqüència de símbols és una representació de una única seqüència de derivació vàlida que representa l’agrupació de símbols que fa l’anàlisi sintàctica.","Un arbre sintàctic representa explícitament com l’anàlisi sintàctica agrupa el símbols d’una seqüència de símbols.","a) i c).","Cap de les anteriors."],ans:3},
  {year:"2022",topic:"sintax",q:"Quin avantatge dona transformar una gramàtica en programa respecte a utilitzar un analitzador dirigit per taula?",opts:["El programa és més ràpid que l’analitzador dirigit per taula.","El programa dona lloc on afegir accions que s’hagin de fer durant l’anàlisi sintàctica.","El programa permet que els símbols no terminals puguin utilitzar el mecanisme de pas de paràmetres de les funcions per comunicar-se entre ells.","b) i c).","Cap de les anteriors."],ans:3},
  {year:"2022",topic:"semantic",q:"Quina és l’estructura d’una taula de símbols d’un llenguatge orientat a objecte?",opts:["Té estructura de pila pels àmbits de les classes i estructura de graf acíclic pels àmbits niats.","Té estructura de pila pels àmbits niats i estructura de graf acíclic per l’herència de les classes.","Té estructura de pila pels àmbits niats.","Té estructura de graf acíclic per l’herència de les classes.","Cap de les anteriors."],ans:1},
  {year:"2022",topic:"semantic",q:"Quina informació guardem a la entrada de taula de símbols de les variables de LOOS?",opts:["Nom i tipus.","Nom i valor.","Nom, tipus i valor.","Nom, tipus, valor i àmbit al qual pertany.","Cap de les anteriors."],ans:0},
  {year:"2022",topic:"semantic",q:"Com és el descriptor del tipus de dades d’un array multidimensional?",opts:["És una estructura que conté la llista de les mides de cada dimensió de l’array i el descriptor del tipus de dades dels elements de l’array.","És una estructura que conté el vector de les mides de cada dimensió de l’array i el descriptor del tipus de dades dels elements de l’array.","Està format per una llista d’estructures amb tants elements como dimensions tingui l’array i que cada una compta la mida d’una dimensió i l’apuntador a la següent. L’última apunta al descriptor del tipus de dades dels elements de l’array.","Està format per una llista d’estructures amb tants elements como dimensions tingui l’array més un. La primera estructura compta el descriptor del tipus de dades dels elements de l’array i les següents la mida de cada una de les dimensions.","Cap de les anteriors."],ans:2},
  {year:"2022",topic:"semantic",q:"Quines operacions es fan sobre la taula de símbols a les declaracions?",opts:["Comprovar si el símbol que es declara està duplicat, crear una entrada de la taula de símbols amb tots els atributs del símbol i finalment introduir-la al final de la taula de símbols.","Crear una entrada de la taula de símbols amb tots els atributs del símbol i introduir-la al final de la taula de símbols.","Comprovar si el símbol que es declara està duplicat i crear una entrada de la taula de símbols amb tots els atributs del símbol.","Crear una entrada de la taula de símbols amb tots els atributs del símbol.","Cap de les anteriors."],ans:0},

  {year:"2023",topic:"sintax",q:"De quina manera podem fer una gramàtica LL(1) què generi l’arbre sintàctic per operadors amb associativitat per la dreta i per l’esquerra correctament?",opts:["Associativitat per l’esquerra <operació>::= <operand> {operador <operand>}. Associativitat per la dreta: <operació>::= <operand> {operador <operació>}","Associativitat per l’esquerra <operació>::= {<operació> operador} <operand>. Associativitat per la dreta: <operació>::= <operand> {operador <operació>}","Associativitat per l’esquerra <operació>::= <operand> {operador <operand>}. Associativitat per la dreta: <operació>::= <operand> [operador <operació>]","Associativitat per l’esquerra <operació>::= [<operació> operador] <operand>. Associativitat per la dreta: <operació>::= <operand> [operador <operació>]","Cap de les anteriors."],ans:2},
  {year:"2023",topic:"semantic",q:"Quina estructura té la taula de símbols del llenguatge LOOS?",opts:["Pila pels àmbits niats i graf per l’herència de les classes.","Pila pels àmbits niats i graf acíclic per l’herència de les classes.","Pila pels àmbits niats i arbre per l’herència de les classes.","Pila pels àmbits niats.","Cap de les anteriors."],ans:2},
  {year:"2023",topic:"semantic",q:"En la declaració de tipus de dades de LOOS `Type identificador = <tipus>` es fan les següents operacions a la taula de símbols:",opts:["Type identificador @{comprovar duplicat} = <tipus> @{inserir a la taula de símbols}","Type identificador = <tipus> @{ comprovar duplicat, inserir a la taula de símbols }","Type identificador @{comprovar duplicat, inserir a la taula de símbols} = <tipus>","Type identificador = <tipus> @{inserir a la taula de símbols}","Cap de les anteriors."],ans:2},
  {year:"2023",topic:"semantic",q:"En una expressió variable operadors d’accés. Els operadors d’accés obtenen el descriptor del tipus de dades dels seus resultats...",opts:["Cada operador va recorrent el descriptor del tipus de dades de la variable.","Cada operador crea un nou descriptor pel tipus de dades del seu resultat.","Cada operador accedeix a la part del valor de la variable que l’hi correspon.","Cada operador cerca la variable a la taula de símbols i modifica el seu descriptor de tipus de dades.","Cap de les anteriors."],ans:0},
  {year:"2023",topic:"semantic",q:"Quines operacions semàntiques fa el compilador de LOOS per `var a:integer(10);`",opts:["Insereix a la taula de símbols la variable \"a\".","Crear el descriptor del tipus de dades com TInt. Insereix a la taula de símbols la variable \"a\".","Crear el descriptor del tipus de dades com TInt. Insereix a la taula de símbols la variable \"a\". Crear una llista de descriptors de valor per 10.","Crear el descriptor del tipus de dades com TInt. Insereix a la taula de símbols la variable \"a\". Crear una llista de descriptors de valor per 10. Comprova que es pot construir un Tint amb la llista de descriptors.","Cap de les anteriors."],ans:4},
  {year:"2023",topic:"semantic",q:"Si volem comprovar que la instrucció `return <expressió>` s’està utilitzant correctament hem de verificar que:",opts:["Hem de comprovar que s’utilitza dintre d’una funció. Que el tipus de dades del resultat de l’expressió és el mateix que el tipus de dades que retorna la funció. Que el resultat de l’expressió es pot copiar.","Hem de comprovar que s’utilitza dintre d’una funció. Que el tipus de dades del resultat de l’expressió està inclòs en el tipus de dades que retorna la funció. Que el resultat de l’expressió es pot copiar.","Hem de comprovar que s’utilitza dintre d’una funció. Que el tipus de dades del resultat de l’expressió és el mateix que el tipus de dades que retorna la funció.","Hem de comprovar que s’utilitza dintre d’una funció. Que el tipus de dades del resultat de l’expressió està inclòs en el tipus de dades que retorna la funció.","Cap de les anteriors."],ans:1},

  "lexic":"Anàlisi Lexicogràfica","sintax":"Anàlisi Sintàctica","semantic":"Anàlisi Semàntica"
};

let state = {};
let displayOrder = [];
let filterYear = "all";
let filterTopic = "all";
let wrongOnly = false;

function init() {
  ALL_QUESTIONS.forEach((_,i) => { state[i] = {answered:false, chosen:-1, correct:false}; });
  displayOrder = ALL_QUESTIONS.map((_,i)=>i);
  render();
}

function getFiltered() {
  return displayOrder.filter(i => {
    const q = ALL_QUESTIONS[i];
    if (filterYear !== "all" && q.year !== filterYear) return false;
    if (filterTopic !== "all" && q.topic !== filterTopic) return false;
    if (wrongOnly && !(state[i].answered && !state[i].correct)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById("questionsContainer");
  updateScore(filtered);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Cap pregunta trobada amb els filtres actuals.</div>';
    return;
  }

  // Group by topic
  const groups = {};
  filtered.forEach(i => {
    const t = ALL_QUESTIONS[i].topic;
    if (!groups[t]) groups[t] = [];
    groups[t].push(i);
  });

  let html = "";
  const topicOrder = ["lexic","sintax","semantic"];
  let qNum = 1;
  topicOrder.forEach(topic => {
    if (!groups[topic]) return;
    html += `<div class="topic-section"><h2>${TOPIC_LABELS[topic]}</h2><div class="section-wrap">`;
    groups[topic].forEach(i => {
      const q = ALL_QUESTIONS[i];
      const s = state[i];
      html += renderCard(i, q, s, qNum++);
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function renderCard(i, q, s, num) {
  const answered = s.answered;
  return `<div class="q-card${answered?' answered':''}" id="card-${i}">
    <div class="q-header">
      <div class="q-num">${num}</div>
      <div style="flex:1">
        <div class="q-badges">
          <span class="q-badge">${YEAR_LABELS[q.year]}</span>
          <span class="q-topic">${TOPIC_LABELS[q.topic]}</span>
        </div>
        <div class="q-text">${q.q}</div>
      </div>
    </div>
    <div class="options">
      ${q.opts.map((o,oi) => {
        let cls = "";
        if (answered) {
          if (oi === q.ans) cls = "correct-answer";
          if (oi === s.chosen && s.chosen !== q.ans) cls = "wrong";
          if (oi === s.chosen && s.chosen === q.ans) cls = "correct";
        } else if (oi === s.chosen) cls = "selected";
        return `<div class="opt ${cls}" onclick="choose(${i},${oi})">
          <span class="opt-letter">${String.fromCharCode(97+oi)})</span>
          <span>${o}</span>
        </div>`;
      }).join("")}
    </div>
    <div class="q-status${answered?' show':''} ${s.correct?'ok':'fail'}" id="status-${i}">
      ${s.correct ? '✓ Correcte!' : (answered ? `✗ Incorrecte. La resposta correcta és: <strong>${String.fromCharCode(97+q.ans)}) ${q.opts[q.ans]}</strong>` : '')}
    </div>
  </div>`;
}

function choose(i, oi) {
  if (state[i].answered) return;
  const q = ALL_QUESTIONS[i];
  state[i].answered = true;
  state[i].chosen = oi;
  state[i].correct = (oi === q.ans);
  
  // Update card in place
  const card = document.getElementById("card-"+i);
  card.classList.add("answered");
  const opts = card.querySelectorAll(".opt");
  opts.forEach((el, idx) => {
    el.onclick = null;
    if (idx === q.ans) el.classList.add("correct-answer");
    if (idx === oi && oi !== q.ans) el.classList.add("wrong");
    if (idx === oi && oi === q.ans) el.classList.add("correct");
  });
  const statusEl = document.getElementById("status-"+i);
  statusEl.className = `q-status show ${state[i].correct?'ok':'fail'}`;
  statusEl.innerHTML = state[i].correct
    ? "✓ Correcte!"
    : `✗ Incorrecte. La resposta correcta és: <strong>${String.fromCharCode(97+q.ans)}) ${q.opts[q.ans]}</strong>`;

  const filtered = getFiltered();
  updateScore(filtered);
}

function updateScore(filtered) {
  let correct = 0, wrong = 0, pending = 0;
  filtered.forEach(i => {
    if (!state[i].answered) pending++;
    else if (state[i].correct) correct++;
    else wrong++;
  });
  document.getElementById("scCorrect").textContent = correct + " correctes";
  document.getElementById("scWrong").textContent = wrong + " incorrectes";
  document.getElementById("scPending").textContent = pending + " pendents";
  const total = filtered.length;
  const done = correct + wrong;
  document.getElementById("progressFill").style.width = total ? ((done/total)*100)+"%": "0%";
}

function shuffleAll() {
  for (let i = displayOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [displayOrder[i],displayOrder[j]] = [displayOrder[j],displayOrder[i]];
  }
  wrongOnly = false;
  render();
}

function resetAll() {
  ALL_QUESTIONS.forEach((_,i) => { state[i] = {answered:false, chosen:-1, correct:false}; });
  wrongOnly = false;
  displayOrder = ALL_QUESTIONS.map((_,i)=>i);
  render();
}

function showOnlyWrong() {
  wrongOnly = !wrongOnly;
  render();
}

document.getElementById("filterYear").addEventListener("change", e => {
  filterYear = e.target.value;
  wrongOnly = false;
  render();
});
document.getElementById("filterTopic").addEventListener("change", e => {
  filterTopic = e.target.value;
  wrongOnly = false;
  render();
});

init();
</script>
</body>
</html>
